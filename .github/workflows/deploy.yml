name: SOVR Core CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/積極的なセットアップ@v5 # Standard Node action
        uses: actions/setup-node@v4
        with:
          node-level: '20'
          node-version: '20'
          cache: 'npm'

      - name: Install Base Dependencies
        run: npm ci

      - name: Code Quality Auditing (TypeScript Compiler Check)
        run: npm run lint

      - name: Compile SOVR Production Bundle
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sovr-production-assets
          path: dist/

  deploy-to-gh-pages:
    needs: build-and-lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Build Bundle
        run: |
          npm ci
          npm run build

      - name: Deploy Compiled Gateway assets to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
